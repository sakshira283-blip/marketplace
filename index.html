<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selleverything</title>
  <link rel="icon" type="image/png" href="Sell everything.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #141414;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      padding: 3rem 2rem;
    }

    header {
      max-width: 1100px;
      margin: 0 auto 2.5rem;
      border-bottom: 0.5px solid #2e2e2e;
      padding-bottom: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .header-left {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 26px;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: #f2f2f2;
    }

    header span {
      font-size: 14px;
      color: #666;
    }

    .enter-btn {
      background: #1f1f1f;
      border: 0.5px solid #3e3e3e;
      border-radius: 10px;
      color: #bbb;
      font-size: 13px;
      font-family: inherit;
      padding: 8px 16px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .enter-btn:hover {
      background: #2a2a2a;
      color: #f0f0f0;
      border-color: #555;
    }

    .enter-btn:active {
      transform: scale(0.97);
    }

    .grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .card {
      background: #1f1f1f;
      border: 0.5px solid #2e2e2e;
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
      cursor: pointer;
    }

    .card:hover {
      border-color: #4a4a4a;
      transform: translateY(-2px);
    }

    .img-wrap {
      width: 100%;
      aspect-ratio: 1;
      background: #272727;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .img-wrap .icon-placeholder {
      font-size: 56px;
      opacity: 0.8;
    }

    .card-body {
      padding: 14px;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 6px;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .badge-new  { background: #1a3328; color: #4ade80; }
    .badge-sale { background: #3a1f1f; color: #f87171; }
    .badge-none { display: block; height: 22px; margin-bottom: 8px; }

    .card-name {
      font-size: 14px;
      font-weight: 500;
      color: #e8e8e8;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-cat {
      font-size: 12px;
      color: #606060;
      margin-bottom: 12px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .price {
      font-size: 16px;
      font-weight: 500;
      color: #f0f0f0;
    }

    .add-btn {
      background: #2e2e2e;
      border: 0.5px solid #3e3e3e;
      border-radius: 8px;
      color: #bbb;
      font-size: 13px;
      padding: 6px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: background 0.15s, color 0.15s;
    }

    .add-btn:hover {
      background: #3a3a3a;
      color: #fff;
      border-color: #555;
    }

    .add-btn:active {
      transform: scale(0.97);
    }

    /* Loading & error states */
    .state-msg {
      max-width: 1100px;
      margin: 4rem auto;
      text-align: center;
      font-size: 14px;
      color: #555;
    }

    .state-msg i {
      font-size: 32px;
      display: block;
      margin-bottom: 12px;
      color: #444;
    }

    .state-msg.error i { color: #f87171; }
    .state-msg.error p { color: #f87171; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { display: inline-block; animation: spin 1s linear infinite; }

    @media (max-width: 480px) {
      body { padding: 2rem 1rem; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <h1>Our Products</h1>
      <span id="item-count"></span>
    </div>
    <a href="add-product.html" class="enter-btn">
      <i class="ti ti-plus" style="font-size:14px;" aria-hidden="true"></i>
      Enter Product
    </a>
  </header>

  <div id="state" class="state-msg">
    <i class="ti ti-loader spinning" aria-hidden="true"></i>
    <p>Loading products…</p>
  </div>

  <div class="grid" id="grid"></div>

  <script>
    /* ── Google Sheets published CSV URL ── */
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSm20Uhv9IABdT-sf-TZ6eVRO-D4FzLSjJuQPat1fTcxsX-poDgdZY0tkM18u4qlyNmgHjerIbBiStQ/pub?output=csv";
    /* ───────────────────────────────────── */

    /* ── CSV parser (handles quoted fields with commas) ── */
    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      const headers = splitCSVLine(lines[0]).map(h => h.trim().toLowerCase());
      return lines.slice(1).filter(l => l.trim()).map(line => {
        const values = splitCSVLine(line);
        const obj = {};
        headers.forEach((h, i) => { obj[h] = (values[i] || "").trim(); });
        return obj;
      });
    }

    function splitCSVLine(line) {
      const result = [];
      let cur = "", inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQuotes && line[i + 1] === '"') { cur += '"'; i++; }
          else { inQuotes = !inQuotes; }
        } else if (ch === ',' && !inQuotes) {
          result.push(cur); cur = "";
        } else {
          cur += ch;
        }
      }
      result.push(cur);
      return result;
    }

    /* ── Render a single product card ── */
    function renderCard(p) {
      const card = document.createElement("div");
      card.className = "card";

      const badge = (p.badge || "").toLowerCase();
      const badgeHtml = (badge === "new" || badge === "sale")
        ? `<span class="badge badge-${badge}">${badge === "new" ? "New" : "Sale"}</span>`
        : `<span class="badge-none"></span>`;

      const imgHtml = p.image
        ? `<img src="${p.image}" alt="${p.name}" loading="lazy" />`
        : `<i class="ti ti-photo icon-placeholder" style="color:#555;" aria-hidden="true"></i>`;

      const price = parseFloat(p.price);
      const priceDisplay = isNaN(price) ? p.price : `$${price.toFixed(2)}`;

      card.innerHTML = `
        <div class="img-wrap">${imgHtml}</div>
        <div class="card-body">
          ${badgeHtml}
          <p class="card-name">${p.name}</p>
          <p class="card-cat">${p.category || ""}</p>
          <div class="card-footer">
            <span class="price">${priceDisplay}</span>
            <button class="add-btn" aria-label="Add ${p.name} to cart">
              <i class="ti ti-plus" style="font-size:13px;" aria-hidden="true"></i> Add
            </button>
          </div>
        </div>`;

      return card;
    }

    /* ── Fetch, parse and render ── */
    async function loadProducts() {
      const stateEl = document.getElementById("state");
      const grid    = document.getElementById("grid");
      const countEl = document.getElementById("item-count");

      try {
        const res = await fetch(CSV_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        const products = parseCSV(text).filter(p => p.name);

        stateEl.style.display = "none";

        if (products.length === 0) {
          stateEl.className = "state-msg";
          stateEl.innerHTML = `<i class="ti ti-inbox" aria-hidden="true"></i><p>No products found in the sheet.</p>`;
          stateEl.style.display = "";
          return;
        }

        countEl.textContent = products.length + " item" + (products.length !== 1 ? "s" : "");
        products.forEach(p => grid.appendChild(renderCard(p)));

      } catch (err) {
        stateEl.className = "state-msg error";
        stateEl.innerHTML = `<i class="ti ti-alert-circle" aria-hidden="true"></i><p>Could not load products. Check the sheet is published and the URL is correct.</p>`;
        stateEl.style.display = "";
        console.error("Product load error:", err);
      }
    }

    loadProducts();
  </script>

</body>
</html>
